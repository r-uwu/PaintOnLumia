spring:
  datasource:
    url: jdbc:mysql://localhost:3306/paintonlumia?useSSL=false&serverTimezone=Asia/Seoul
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver
    data:
      redis:
        host: localhost
        port: 6379
        timeout: 5000
  jpa:
    hibernate:
      ddl-auto: update # 애플리케이션 실행 시 테이블 자동 생성/수정
    show-sql: false # 트래픽이 많으므로 쿼리 로그는 끄는 것을 권장