<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PaintOnLumia - 프로토타입</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #222; color: white; font-family: sans-serif; }
        #displayCanvas { display: block; cursor: crosshair; }
        #ui { position: fixed; top: 10px; left: 10px; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 8px; pointer-events: auto; user-select: none; z-index: 10; }
        .control-group { margin-bottom: 8px; }
        label { display: inline-block; width: 60px; font-size: 12px; }
        input[type="color"] { border: none; width: 40px; height: 25px; cursor: pointer; vertical-align: middle;}
        #palette { display: flex; flex-wrap: wrap; gap: 4px; width: 140px; margin-top: 5px; }
        .palette-btn { width: 20px; height: 20px; border-radius: 50%; cursor: pointer; border: 1px solid #555; transition: transform 0.1s; }
        .palette-btn:hover { transform: scale(1.2); }
        .progress-container { width: 100%; background-color: #555; height: 6px; margin-top: 5px; border-radius: 3px; overflow: hidden; }
        .progress-bar { width: 100%; background-color: #32CD32; height: 100%; transition: width 0.1s linear; }
    </style>
</head>
<body>

<canvas id="displayCanvas"></canvas>

<div id="ui">
    <div class="control-group">
        <label>색상:</label>
        <input type="color" id="colorPicker" value="#FF4500">
    </div>
    <div class="control-group">
        <label>두께:</label>
        <input type="range" id="brushSize" min="1" max="10" value="1">
        <span id="brushSizeVal">1</span>px
    </div>
    <div class="control-group" id="palette"></div>

    <div class="control-group" style="font-weight: bold; color: #32CD32;">
        남은 픽셀: <span id="quotaDisplay"></span> / <span id="maxQuotaDisplay"></span>
        <div class="progress-container">
            <div id="regenProgressBar" class="progress-bar"></div>
        </div>
        <div style="font-size: 10px; color: #aaa; text-align: right; margin-top: 2px;">
            다음 충전: <span id="regenTimeDisplay">0.0</span>초
        </div>
    </div>

    <div class="control-group" style="font-size: 11px; margin-top:10px;">
        <div>좌표: <span id="coords">0, 0</span></div>
        <div>줌: <span id="zoomLevel">1.0</span>x</div>
        <div style="color:#aaa; margin-top:5px;">Ctrl+Z: 실행 취소</div>
    </div>
</div>

<script>
    // --- 1. 환경 설정 ---
    const CONFIG = {
        MAP_SIZE: 2000,
        MAX_QUOTA: 1000,
        REGEN_TIME_MS: 10000,
        PALETTE_COLORS: ['#FFFFFF', '#000000', '#FF4500', '#1E90FF', '#32CD32', '#FFD700', '#FF69B4', '#8A2BE2']
    };

    // --- 2. 상태 변수 ---
    let currentColor = CONFIG.PALETTE_COLORS[2];
    let currentSize = 1;
    let currentQuota = CONFIG.MAX_QUOTA;
    let lastRegenTime = Date.now();

    let camX = CONFIG.MAP_SIZE / 2;
    let camY = CONFIG.MAP_SIZE / 2;
    let zoom = 1.0;

    let isDrawing = false;
    let isPanning = false;
    let lastMouseX = 0, lastMouseY = 0;
    let lastMapX = null, lastMapY = null;

    // Undo 관련 상태
    const MAX_UNDO_STACK = 10;
    let undoHistory = [];
    let currentAction = null;
    let currentStrokeCoords = new Set();

    // --- 3. DOM 요소 및 컨텍스트 세팅 ---
    const displayCanvas = document.getElementById('displayCanvas');
    const displayCtx = displayCanvas.getContext('2d', { alpha: false });

    const backCanvas = document.createElement('canvas');
    backCanvas.width = CONFIG.MAP_SIZE;
    backCanvas.height = CONFIG.MAP_SIZE;
    // 경고 해결: willReadFrequently 옵션 추가
    const backCtx = backCanvas.getContext('2d', { alpha: false, willReadFrequently: true });

    backCtx.fillStyle = '#FFFFFF';
    backCtx.fillRect(0, 0, CONFIG.MAP_SIZE, CONFIG.MAP_SIZE);

    const uiElements = {
        colorPicker: document.getElementById('colorPicker'),
        brushSizeInput: document.getElementById('brushSize'),
        brushSizeVal: document.getElementById('brushSizeVal'),
        quotaDisplay: document.getElementById('quotaDisplay'),
        maxQuotaDisplay: document.getElementById('maxQuotaDisplay'),
        regenProgressBar: document.getElementById('regenProgressBar'),
        regenTimeDisplay: document.getElementById('regenTimeDisplay'),
        paletteContainer: document.getElementById('palette'),
        coordsDisplay: document.getElementById('coords'),
        zoomDisplay: document.getElementById('zoomLevel')
    };

    uiElements.maxQuotaDisplay.textContent = CONFIG.MAX_QUOTA;
    uiElements.colorPicker.value = currentColor;

    // --- 4. 핵심 로직 함수 (순서 중요) ---

    // UI 업데이트 함수 (ReferenceError 해결)
    function updateQuotaUI() {
        uiElements.quotaDisplay.textContent = currentQuota;
        uiElements.quotaDisplay.style.color = (currentQuota <= 0) ? 'red' : '#32CD32';
    }
    updateQuotaUI(); // 초기화

    function render() {
        displayCanvas.width = window.innerWidth;
        displayCanvas.height = window.innerHeight;
        displayCtx.imageSmoothingEnabled = false;

        displayCtx.fillStyle = "#222";
        displayCtx.fillRect(0, 0, displayCanvas.width, displayCanvas.height);

        const viewW = displayCanvas.width / zoom;
        const viewH = displayCanvas.height / zoom;
        const sx = camX - viewW / 2;
        const sy = camY - viewH / 2;

        displayCtx.drawImage(backCanvas, sx, sy, viewW, viewH, 0, 0, displayCanvas.width, displayCanvas.height);
        uiElements.zoomDisplay.textContent = zoom.toFixed(1);
    }

    function screenToMapCoords(screenX, screenY) {
        const viewW = displayCanvas.width / zoom;
        const viewH = displayCanvas.height / zoom;
        return {
            x: Math.floor((camX - viewW / 2) + (screenX / zoom)),
            y: Math.floor((camY - viewH / 2) + (screenY / zoom))
        };
    }

    function setPixel(x, y, color) {
        if (x < 0 || x >= CONFIG.MAP_SIZE || y < 0 || y >= CONFIG.MAP_SIZE) return;
        if (currentQuota <= 0) return;

        const offset = Math.floor(currentSize / 2);
        const startX = x - offset;
        const startY = y - offset;

        // 1. 중복 렌더링 방지 (쿼터 누수 해결)
        const coordKey = `${startX},${startY}`;
        if (currentStrokeCoords.has(coordKey)) return;
        currentStrokeCoords.add(coordKey);

        // 2. Undo 데이터 수집 (안전하게 oldData 캡처)
        if (currentAction !== null) {
            const oldData = backCtx.getImageData(startX, startY, currentSize, currentSize);
            currentAction.pixels.push({ x: startX, y: startY, oldData: oldData });
            currentAction.quotaCost++;
        }

        // 3. 캔버스에 그리기 및 쿼터 차감
        backCtx.fillStyle = color;
        backCtx.fillRect(startX, startY, currentSize, currentSize);

        currentQuota--;
        updateQuotaUI();
    }

    function drawLine(x1, y1, x2, y2, color) {
        const dx = Math.abs(x2 - x1), dy = Math.abs(y2 - y1);
        const sx = (x1 < x2) ? 1 : -1, sy = (y1 < y2) ? 1 : -1;
        let err = dx - dy;

        while (true) {
            if (currentQuota <= 0) break;
            setPixel(x1, y1, color);
            if (x1 === x2 && y1 === y2) break;
            const e2 = 2 * err;
            if (e2 > -dy) { err -= dy; x1 += sx; }
            if (e2 < dx) { err += dx; y1 += sy; }
        }
    }

    // --- 5. 타이머 및 UI 이벤트 ---

    function updateRegenTimer() {
        if (currentQuota < CONFIG.MAX_QUOTA) {
            const now = Date.now();
            const elapsed = now - lastRegenTime;

            if (elapsed >= CONFIG.REGEN_TIME_MS) {
                currentQuota++;
                lastRegenTime = now - (elapsed - CONFIG.REGEN_TIME_MS);
                updateQuotaUI();
            }

            const currentElapsed = Date.now() - lastRegenTime;
            const remaining = Math.max(0, CONFIG.REGEN_TIME_MS - currentElapsed);
            const progressPercent = (currentElapsed / CONFIG.REGEN_TIME_MS) * 100;

            uiElements.regenProgressBar.style.width = `${progressPercent}%`;
            uiElements.regenTimeDisplay.textContent = (remaining / 1000).toFixed(1);
        } else {
            uiElements.regenProgressBar.style.width = `100%`;
            uiElements.regenTimeDisplay.textContent = "0.0";
            lastRegenTime = Date.now();
        }
        requestAnimationFrame(updateRegenTimer);
    }
    requestAnimationFrame(updateRegenTimer);

    // 팔레트 생성
    CONFIG.PALETTE_COLORS.forEach(color => {
        const btn = document.createElement('div');
        btn.style.backgroundColor = color;
        btn.className = 'palette-btn';
        btn.dataset.color = color;
        if (color === currentColor) btn.style.border = '2px solid #FFF';
        uiElements.paletteContainer.appendChild(btn);
    });

    uiElements.paletteContainer.addEventListener('click', (e) => {
        if (e.target.classList.contains('palette-btn')) {
            currentColor = e.target.dataset.color;
            uiElements.colorPicker.value = currentColor;
            document.querySelectorAll('.palette-btn').forEach(b => b.style.border = '1px solid #555');
            e.target.style.border = '2px solid #FFF';
        }
    });

    uiElements.brushSizeInput.addEventListener('input', (e) => {
        currentSize = parseInt(e.target.value, 10);
        uiElements.brushSizeVal.textContent = currentSize;
    });

    uiElements.colorPicker.addEventListener('input', (e) => {
        currentColor = e.target.value;
        document.querySelectorAll('.palette-btn').forEach(b => b.style.border = '1px solid #555');
    });

    // --- 6. 캔버스 마우스 상호작용 및 Undo ---

    displayCanvas.addEventListener('mousedown', (e) => {
        const mapCoords = screenToMapCoords(e.clientX, e.clientY);
        if (e.button === 0) {
            isDrawing = true;
            lastMapX = mapCoords.x;
            lastMapY = mapCoords.y;

            // Undo를 위한 세션 초기화
            currentStrokeCoords.clear();
            currentAction = { pixels: [], quotaCost: 0 };

            setPixel(mapCoords.x, mapCoords.y, currentColor);
            render();
        } else if (e.button === 2) {
            isPanning = true;
            lastMouseX = e.clientX;
            lastMouseY = e.clientY;
        }
    });

    displayCanvas.addEventListener('mousemove', (e) => {
        const mapCoords = screenToMapCoords(e.clientX, e.clientY);
        uiElements.coordsDisplay.textContent = `${mapCoords.x}, ${mapCoords.y}`;

        if (isDrawing) {
            if (lastMapX === mapCoords.x && lastMapY === mapCoords.y) return; // 위치 변경 없을 시 스킵
            drawLine(lastMapX, lastMapY, mapCoords.x, mapCoords.y, currentColor);
            lastMapX = mapCoords.x;
            lastMapY = mapCoords.y;
            render();
        } else if (isPanning) {
            camX -= (e.clientX - lastMouseX) / zoom;
            camY -= (e.clientY - lastMouseY) / zoom;
            camX = Math.max(0, Math.min(CONFIG.MAP_SIZE, camX));
            camY = Math.max(0, Math.min(CONFIG.MAP_SIZE, camY));
            lastMouseX = e.clientX;
            lastMouseY = e.clientY;
            render();
        }
    });

    window.addEventListener('mouseup', () => {
        if (isDrawing && currentAction && currentAction.pixels.length > 0) {
            undoHistory.push(currentAction);
            if (undoHistory.length > MAX_UNDO_STACK) undoHistory.shift();
        }
        isDrawing = false;
        isPanning = false;
        currentAction = null;
    });

    // Undo (Ctrl+Z) 단축키
    window.addEventListener('keydown', (e) => {
        if (e.ctrlKey && e.key.toLowerCase() === 'z') {
            e.preventDefault();
            if (undoHistory.length === 0) return;

            const lastAction = undoHistory.pop();

            // NOTE: 로컬 전용 Undo. 서버 연동 시 타인의 그림을 덮어쓰는 문제가 발생할 수 있음.
            for (let i = lastAction.pixels.length - 1; i >= 0; i--) {
                const p = lastAction.pixels[i];
                backCtx.putImageData(p.oldData, p.x, p.y);
            }

            currentQuota = Math.min(CONFIG.MAX_QUOTA, currentQuota + lastAction.quotaCost);
            updateQuotaUI();

            if (currentQuota < CONFIG.MAX_QUOTA) lastRegenTime = Date.now();
            render();
        }
    });

    displayCanvas.addEventListener('wheel', (e) => {
        e.preventDefault();
        const oldZoom = zoom;
        zoom *= (e.deltaY > 0) ? (1 / 1.1) : 1.1;
        zoom = Math.max(0.5, Math.min(50.0, zoom));

        const mapCoords = screenToMapCoords(e.clientX, e.clientY);
        camX = mapCoords.x + (camX - mapCoords.x) * (oldZoom / zoom);
        camY = mapCoords.y + (camY - mapCoords.y) * (oldZoom / zoom);
        render();
    }, { passive: false });

    window.addEventListener('resize', render);
    displayCanvas.addEventListener('contextmenu', e => e.preventDefault());

    render();
</script>
</body>
</html>
