<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PaintOnLumia - Beta</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <style>
        :root {
            --bg-dark: rgba(20, 20, 25, 0.9);
            --primary: #32CD32;
            --accent: #FF4500;
            --text-main: #FFFFFF;
            --text-sub: #AAAAAA;
        }
        /* touch-action: none; 으로 모바일 브라우저 기본 스크롤/확대 방지 */
        body { margin: 0; padding: 0; overflow: hidden; background-color: #111; color: var(--text-main); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; touch-action: none; }
        #displayCanvas { display: block; cursor: crosshair; }

        /* 사이드바 기본 형태 (PC) */
        #sidebar {
            position: fixed; top: 0; left: 0; width: 280px; height: 100vh;
            background: var(--bg-dark); backdrop-filter: blur(10px);
            border-right: 1px solid rgba(255,255,255,0.1);
            display: flex; flex-direction: column; z-index: 10;
            transition: transform 0.3s ease;
        }

        .header { padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .header h1 { margin: 0 0 10px 0; font-size: 20px; color: var(--accent); }
        .status-row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 5px; }
        .tabs { display: flex; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .tab-btn { flex: 1; background: none; border: none; color: var(--text-sub); padding: 12px 0; cursor: pointer; transition: 0.2s; font-weight: bold; }
        .tab-btn.active { color: var(--text-main); border-bottom: 2px solid var(--primary); }

        .panel { display: none; padding: 20px; flex: 1; overflow-y: auto; }
        .panel.active { display: block; }
        .control-group { margin-bottom: 20px; }
        .control-group label { display: block; font-size: 12px; color: var(--text-sub); margin-bottom: 8px; }

        #palette { display: grid; grid-template-columns: repeat(auto-fill, minmax(24px, 1fr)); gap: 6px; }
        .palette-btn { width: 100%; aspect-ratio: 1; border-radius: 4px; cursor: pointer; border: 1px solid #444; transition: transform 0.1s; }
        .palette-btn.selected { border: 2px solid #FFF; transform: scale(1.1); }

        .progress-container { width: 100%; background-color: rgba(255,255,255,0.1); height: 8px; border-radius: 4px; overflow: hidden; margin-top: 5px; }
        .progress-bar { width: 100%; background-color: var(--primary); height: 100%; transition: width 0.1s linear; }

        input[type="range"] { width: 100%; accent-color: var(--primary); }
        input[type="color"] { border: none; width: 100%; height: 30px; border-radius: 4px; cursor: pointer; background: none; }
        .action-btn { width: 100%; padding: 10px; background: rgba(50, 205, 50, 0.2); border: 1px solid var(--primary); color: var(--text-main); border-radius: 4px; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
        .mission-card { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); padding: 12px; border-radius: 6px; margin-bottom: 10px; }

        /* 모바일용 플로팅 컨트롤 (기본 숨김) */
        #mobileControls { display: none; position: fixed; top: 10px; right: 10px; z-index: 20; gap: 8px; }
        .floating-btn { background: rgba(0,0,0,0.6); color: #FFF; border: 1px solid rgba(255,255,255,0.3); padding: 10px 14px; border-radius: 8px; backdrop-filter: blur(5px); cursor: pointer; font-weight: bold; font-size: 13px; }

        /* --- 모바일 반응형 미디어 쿼리 --- */
        @media (max-width: 768px) {
            #sidebar {
                transform: translateX(-100%); /* 화면 밖으로 숨김 */
                width: 85%; max-width: 320px;
                box-shadow: 5px 0 15px rgba(0,0,0,0.8);
            }
            #sidebar.open {
                transform: translateX(0); /* 메뉴 오픈 시 나타남 */
            }
            #mobileControls { display: flex; } /* 모바일 컨트롤 활성화 */
        }
    </style>
</head>
<body>

<canvas id="displayCanvas"></canvas>

<!-- 모바일 플로팅 UI -->
<div id="mobileControls">
    <button id="touchModeBtn" class="floating-btn" onclick="toggleTouchMode()">✏️ 그리기</button>
    <button id="menuBtn" class="floating-btn" onclick="toggleSidebar()">☰ 메뉴</button>
</div>

<div id="sidebar">
    <div class="header">
        <h1>PaintOnLumia</h1>
        <div class="status-row">
            <span>픽셀: <strong id="quotaDisplay" style="color:var(--primary)">0</strong> / <span id="maxQuotaDisplay">0</span></span>
            <span>포인트: <strong id="pointsDisplay" style="color:var(--accent)">0</strong> P</span>
        </div>
        <div class="progress-container">
            <div id="regenProgressBar" class="progress-bar"></div>
        </div>
        <div style="font-size: 11px; color: var(--text-sub); text-align: right; margin-top: 4px;">다음 충전: <span id="regenTimeDisplay">0.0</span>초</div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('tool')">도구</button>
        <button class="tab-btn" onclick="switchTab('mission')">미션</button>
        <button class="tab-btn" onclick="switchTab('shop')">상점</button>
    </div>

    <div id="panel-tool" class="panel active">
        <div class="control-group">
            <label>색상</label>
            <input type="color" id="colorPicker" value="#FF4500">
        </div>
        <div class="control-group">
            <label>팔레트</label>
            <div id="palette"></div>
        </div>
        <div class="control-group">
            <label>두께: <span id="brushSizeVal" style="color:#FFF">1</span>px</label>
            <input type="range" id="brushSize" min="1" max="10" value="1">
        </div>
        <div class="control-group" style="font-size: 11px; color: var(--text-sub); line-height: 1.6;">
            [PC 조작]<br>좌클릭: 그리기 / 우클릭: 이동 / 휠: 줌<br>
            [모바일 조작]<br>1손가락: 우측 상단 모드에 따라 동작<br>2손가락: 화면 확대/축소 및 이동
        </div>
    </div>

    <div id="panel-mission" class="panel">
        <div id="missionContainer"></div>
    </div>

    <div id="panel-shop" class="panel">
        <div class="control-group">
            <button class="action-btn" onclick="shopBuyRefill()">픽셀 즉시 충전 (50P)</button>
            <button class="action-btn" onclick="shopBuyMaxQuota()">최대 쿼터 +50 확장 (150P)</button>
        </div>
    </div>
</div>

<script>
    // --- 1. 앱 진입 및 설정 ---
    const currentUsername = sessionStorage.getItem('username');
    if (!currentUsername) window.location.href = '/login.html';

    const CONFIG = {
        MAP_SIZE: 2000,
        BASE_MAX_QUOTA: 100,
        REGEN_TIME_MS: 10000,
        PALETTE_COLORS: [
            '#000000', '#1A1A1A', '#333333', '#4D4D4D', '#666666', '#808080', '#B3B3B3', '#CCCCCC', '#E6E6E6', '#FFFFFF',
            '#FF0000', '#FF4500', '#FF8C00', '#FFD700', '#FFFF00', '#9ACD32', '#32CD32', '#00FF00', '#00FA9A', '#00CED1',
            '#00BFFF', '#1E90FF', '#0000FF', '#8A2BE2', '#9932CC', '#FF00FF', '#FF69B4', '#FF1493', '#8B0000', '#8B4513'
        ],
        DEV_MODE: true,
        DEV_START_QUOTA: 99999,
        DEV_START_MAX_QUOTA: 99999,
        DEV_START_POINTS: 5000
    };

    const GameState = { points: 0, pixelsDrawn: 0, uniqueColorsUsed: new Set(), currentMaxQuota: CONFIG.BASE_MAX_QUOTA };

    const Missions = [
        { id: 1, title: '첫 걸음', desc: '픽셀 50개 그리기', target: 50, reward: 50, current: 0, completed: false, type: 'draw' },
        { id: 2, title: '예술가', desc: '픽셀 200개 그리기', target: 200, reward: 100, current: 0, completed: false, type: 'draw' },
        { id: 3, title: '다채로움', desc: '5가지 색상 사용', target: 5, reward: 80, current: 0, completed: false, type: 'color' }
    ];

    let currentColor = CONFIG.PALETTE_COLORS[11];
    let currentSize = 1, currentQuota = 0, lastRegenTime = Date.now();
    let camX = CONFIG.MAP_SIZE / 2, camY = CONFIG.MAP_SIZE / 2, zoom = 1.0;

    // 모바일 터치 및 마우스 상태 변수
    let isDrawing = false, isPanning = false, isPinching = false;
    let lastMouseX = 0, lastMouseY = 0, lastMapX = null, lastMapY = null;
    let initialPinchDistance = 0;
    let currentTouchMode = 'draw'; // 'draw' | 'pan'
    let isSidebarOpen = false;

    let currentAction = null, undoHistory = [], currentStrokeCoords = new Set();
    let stompClient = null, isConnected = false, pixelBuffer = [];
    const BATCH_INTERVAL_MS = 50;

    const ui = {
        quota: document.getElementById('quotaDisplay'), maxQuota: document.getElementById('maxQuotaDisplay'),
        points: document.getElementById('pointsDisplay'), colorPicker: document.getElementById('colorPicker'),
        palette: document.getElementById('palette'), missionContainer: document.getElementById('missionContainer'),
        displayCanvas: document.getElementById('displayCanvas'), brushSizeVal: document.getElementById('brushSizeVal'),
        sidebar: document.getElementById('sidebar'), touchModeBtn: document.getElementById('touchModeBtn')
    };

    const displayCtx = ui.displayCanvas.getContext('2d', { alpha: false });
    const backCanvas = document.createElement('canvas'); backCanvas.width = CONFIG.MAP_SIZE; backCanvas.height = CONFIG.MAP_SIZE;
    const backCtx = backCanvas.getContext('2d', { alpha: false, willReadFrequently: true });
    backCtx.fillStyle = '#FFFFFF'; backCtx.fillRect(0, 0, CONFIG.MAP_SIZE, CONFIG.MAP_SIZE);

    // --- 2. 앱 초기화 (기존 동일) ---
    async function initializeApp() {
        try {
            const res = await fetch(`/api/user/info?username=${currentUsername}`);
            if (!res.ok) throw new Error("유저 정보를 불러올 수 없습니다.");
            const userData = await res.json();

            if (CONFIG.DEV_MODE) {
                currentQuota = CONFIG.DEV_START_QUOTA; GameState.currentMaxQuota = CONFIG.DEV_START_MAX_QUOTA; GameState.points = CONFIG.DEV_START_POINTS;
                syncUserData();
            } else {
                currentQuota = userData.currentQuota; GameState.currentMaxQuota = userData.maxQuota; GameState.points = userData.points;
            }
            lastRegenTime = Date.now();

            initUI(); renderCanvas(); requestAnimationFrame(updateTimer); connectWebSocket();
            setInterval(syncUserData, 5000); setInterval(flushPixelBuffer, BATCH_INTERVAL_MS);
        } catch (error) {
            alert("세션이 만료되었거나 오류가 발생했습니다."); sessionStorage.removeItem('username'); window.location.href = '/login.html';
        }
    }

    function syncUserData() {
        fetch('/api/user/sync', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: currentUsername, currentQuota: currentQuota, maxQuota: GameState.currentMaxQuota, points: GameState.points, lastUpdateTime: Date.now() })
        });
    }

    // --- 3. UI 및 렌더링 (기존 동일) ---
    function toggleSidebar() {
        isSidebarOpen = !isSidebarOpen;
        ui.sidebar.classList.toggle('open', isSidebarOpen);
    }

    function toggleTouchMode() {
        if (currentTouchMode === 'draw') {
            currentTouchMode = 'pan';
            ui.touchModeBtn.textContent = '🖐 이동';
            ui.touchModeBtn.style.color = '#FFD700';
        } else {
            currentTouchMode = 'draw';
            ui.touchModeBtn.textContent = '✏️ 그리기';
            ui.touchModeBtn.style.color = '#FFF';
        }
    }

    function switchTab(tabId) {
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(panel => panel.classList.remove('active'));
        event.target.classList.add('active');
        document.getElementById('panel-' + tabId).classList.add('active');
    }

    function updateTopStatusUI() {
        ui.quota.textContent = currentQuota; ui.maxQuota.textContent = GameState.currentMaxQuota; ui.points.textContent = GameState.points;
        ui.quota.style.color = (currentQuota <= 0) ? 'red' : 'var(--primary)';
    }

    function renderCanvas() {
        ui.displayCanvas.width = window.innerWidth; ui.displayCanvas.height = window.innerHeight;
        displayCtx.imageSmoothingEnabled = false; displayCtx.fillStyle = "#111"; displayCtx.fillRect(0, 0, ui.displayCanvas.width, ui.displayCanvas.height);
        const vw = ui.displayCanvas.width / zoom, vh = ui.displayCanvas.height / zoom;
        const sx = camX - vw / 2, sy = camY - vh / 2;
        displayCtx.drawImage(backCanvas, sx, sy, vw, vh, 0, 0, ui.displayCanvas.width, ui.displayCanvas.height);
    }

    function initUI() {
        CONFIG.PALETTE_COLORS.forEach(color => {
            const btn = document.createElement('div'); btn.className = 'palette-btn'; btn.style.backgroundColor = color; btn.dataset.color = color;
            if (color === currentColor) btn.classList.add('selected'); ui.palette.appendChild(btn);
        });
        ui.colorPicker.value = currentColor; updateTopStatusUI(); renderMissions();
    }

    // --- 4. 미션/상점/비즈니스 (생략 불가, 원본 유지) ---
    function renderMissions() {
        ui.missionContainer.innerHTML = '';
        Missions.forEach(m => {
            const card = document.createElement('div'); card.className = `mission-card ${m.completed ? 'completed' : ''}`;
            const progress = (m.current / m.target) * 100;
            card.innerHTML = `<div class="mission-title">${m.title} <span class="mission-reward">${m.reward}P</span></div><div style="font-size:11px; color:#aaa;">${m.desc}</div><div class="progress-container" style="height:4px;"><div class="progress-bar" style="width: ${progress}%"></div></div><div class="mission-status">${m.current} / ${m.target}</div>`;
            ui.missionContainer.appendChild(card);
        });
    }

    function checkMissions(type) {
        let updated = false;
        Missions.forEach(m => {
            if (!m.completed && m.type === type) {
                if (type === 'draw') m.current = GameState.pixelsDrawn;
                if (type === 'color') m.current = GameState.uniqueColorsUsed.size;
                if (m.current >= m.target) { m.current = m.target; m.completed = true; GameState.points += m.reward; alert(`미션 완료: ${m.title}! ${m.reward} 포인트를 획득했습니다.`); updateTopStatusUI(); }
                updated = true;
            }
        });
        if (updated) renderMissions();
    }

    function shopBuyRefill() {
        if (GameState.points < 50) return alert("포인트가 부족합니다.");
        if (currentQuota >= GameState.currentMaxQuota) return alert("이미 쿼터가 최대치입니다.");
        GameState.points -= 50; currentQuota = GameState.currentMaxQuota; updateTopStatusUI(); alert("충전 완료");
    }

    function shopBuyMaxQuota() {
        if (GameState.points < 150) return alert("포인트가 부족합니다.");
        GameState.points -= 150; GameState.currentMaxQuota += 50; currentQuota += 50; updateTopStatusUI(); alert("최대 쿼터 증가");
    }

    function rgbToHex(r, g, b) { return "#" + (1 << 24 | r << 16 | g << 8 | b).toString(16).slice(1).toUpperCase(); }

    // --- 5. 드로잉 로직 (기존 동일) ---
    function setPixel(x, y, color, isRemote = false) {
        if (x < 0 || x >= CONFIG.MAP_SIZE || y < 0 || y >= CONFIG.MAP_SIZE) return;
        const offset = Math.floor(currentSize / 2); const startX = x - offset, startY = y - offset; const targetColorUpper = color.toUpperCase();
        if (isRemote) { backCtx.fillStyle = color; backCtx.fillRect(startX, startY, currentSize, currentSize); return; }

        let actualCost = 0; const validPixels = []; const existingData = backCtx.getImageData(startX, startY, currentSize, currentSize).data;
        for (let i = 0; i < currentSize; i++) {
            for (let j = 0; j < currentSize; j++) {
                const px = startX + i, py = startY + j;
                if (px < 0 || px >= CONFIG.MAP_SIZE || py < 0 || py >= CONFIG.MAP_SIZE) continue;
                const pixelKey = px + "," + py; if (currentStrokeCoords.has(pixelKey)) continue;
                const dataIdx = (j * currentSize + i) * 4;
                if (existingData[dataIdx+3] !== 0 && rgbToHex(existingData[dataIdx], existingData[dataIdx+1], existingData[dataIdx+2]) === targetColorUpper) continue;
                currentStrokeCoords.add(pixelKey); validPixels.push({px, py}); actualCost++;
            }
        }
        if (actualCost === 0) return;
        if (currentQuota < actualCost) { validPixels.length = currentQuota; actualCost = currentQuota; if (actualCost === 0) return; }
        if (currentAction !== null) { currentAction.pixels.push({ x: startX, y: startY, oldData: backCtx.getImageData(startX, startY, currentSize, currentSize) }); currentAction.quotaCost += actualCost; }
        if (isConnected && stompClient) pixelBuffer.push({ x: x, y: y, color: color, size: currentSize });

        currentQuota -= actualCost; GameState.pixelsDrawn += actualCost; GameState.uniqueColorsUsed.add(color); updateTopStatusUI(); checkMissions('draw');
        backCtx.fillStyle = color; for (let i = 0; i < validPixels.length; i++) backCtx.fillRect(validPixels[i].px, validPixels[i].py, 1, 1);
    }

    function drawLine(x1, y1, x2, y2, color) {
        const dx = Math.abs(x2 - x1), dy = Math.abs(y2 - y1); const sx = (x1 < x2) ? 1 : -1, sy = (y1 < y2) ? 1 : -1; let err = dx - dy;
        while (true) {
            if (currentQuota <= 0) break; setPixel(x1, y1, color); if (x1 === x2 && y1 === y2) break;
            const e2 = 2 * err; if (e2 > -dy) { err -= dy; x1 += sx; } if (e2 < dx) { err += dx; y1 += sy; }
        }
    }

    // --- 6. 이벤트 리스너 (PC + 모바일 완벽 통합) ---
    ui.palette.addEventListener('click', (e) => {
        if (e.target.classList.contains('palette-btn')) {
            currentColor = e.target.dataset.color; ui.colorPicker.value = currentColor;
            document.querySelectorAll('.palette-btn').forEach(b => b.classList.remove('selected')); e.target.classList.add('selected');
            GameState.uniqueColorsUsed.add(currentColor); checkMissions('color');
        }
    });

    ui.colorPicker.addEventListener('input', (e) => { currentColor = e.target.value; document.querySelectorAll('.palette-btn').forEach(b => b.classList.remove('selected')); GameState.uniqueColorsUsed.add(currentColor); checkMissions('color'); });
    document.getElementById('brushSize').addEventListener('input', (e) => { currentSize = parseInt(e.target.value, 10); ui.brushSizeVal.textContent = currentSize; });

    // 좌표 계산 헬퍼 함수
    function getCoords(clientX, clientY) {
        const vw = ui.displayCanvas.width / zoom, vh = ui.displayCanvas.height / zoom;
        return { mx: Math.floor((camX - vw/2) + (clientX / zoom)), my: Math.floor((camY - vh/2) + (clientY / zoom)) };
    }

    // [PC 마우스 이벤트]
    ui.displayCanvas.addEventListener('mousedown', (e) => {
        if (isSidebarOpen && window.innerWidth <= 768) toggleSidebar();
        const c = getCoords(e.clientX, e.clientY);
        if (e.button === 0) {
            isDrawing = true; lastMapX = c.mx; lastMapY = c.my; currentStrokeCoords.clear(); currentAction = { pixels: [], quotaCost: 0 }; setPixel(c.mx, c.my, currentColor); renderCanvas();
        } else if (e.button === 2) {
            isPanning = true; lastMouseX = e.clientX; lastMouseY = e.clientY;
        }
    });

    ui.displayCanvas.addEventListener('mousemove', (e) => {
        const c = getCoords(e.clientX, e.clientY);
        if (isDrawing) {
            if (lastMapX === c.mx && lastMapY === c.my) return;
            drawLine(lastMapX, lastMapY, c.mx, c.my, currentColor); lastMapX = c.mx; lastMapY = c.my; renderCanvas();
        } else if (isPanning) {
            camX -= (e.clientX - lastMouseX) / zoom; camY -= (e.clientY - lastMouseY) / zoom;
            camX = Math.max(0, Math.min(CONFIG.MAP_SIZE, camX)); camY = Math.max(0, Math.min(CONFIG.MAP_SIZE, camY)); lastMouseX = e.clientX; lastMouseY = e.clientY; renderCanvas();
        }
    });

    window.addEventListener('mouseup', () => {
        if (isDrawing && currentAction && currentAction.pixels.length > 0) { undoHistory.push(currentAction); if (undoHistory.length > 10) undoHistory.shift(); }
        isDrawing = false; isPanning = false; currentAction = null;
    });

    ui.displayCanvas.addEventListener('wheel', (e) => {
        e.preventDefault(); const oldZoom = zoom; zoom *= (e.deltaY > 0) ? (1 / 1.1) : 1.1; zoom = Math.max(0.5, Math.min(50.0, zoom));
        const vw = ui.displayCanvas.width / zoom; camX += ((camX - vw/2 + e.clientX/zoom) - camX) * (oldZoom/zoom - 1); renderCanvas();
    }, { passive: false });

    // [모바일 터치 이벤트 (Pinch to Zoom & Touch Mode)]
    ui.displayCanvas.addEventListener('touchstart', (e) => {
        if (isSidebarOpen && window.innerWidth <= 768) toggleSidebar();
        if (e.touches.length === 1) {
            const c = getCoords(e.touches[0].clientX, e.touches[0].clientY);
            if (currentTouchMode === 'draw') {
                isDrawing = true; lastMapX = c.mx; lastMapY = c.my; currentStrokeCoords.clear(); currentAction = { pixels: [], quotaCost: 0 }; setPixel(c.mx, c.my, currentColor); renderCanvas();
            } else {
                isPanning = true; lastMouseX = e.touches[0].clientX; lastMouseY = e.touches[0].clientY;
            }
        } else if (e.touches.length === 2) {
            isDrawing = false; isPanning = false; isPinching = true;
            const dx = e.touches[0].clientX - e.touches[1].clientX, dy = e.touches[0].clientY - e.touches[1].clientY;
            initialPinchDistance = Math.sqrt(dx*dx + dy*dy);
        }
    }, { passive: false });

    ui.displayCanvas.addEventListener('touchmove', (e) => {
        e.preventDefault(); // 스와이프 새로고침 방지
        if (e.touches.length === 1) {
            const c = getCoords(e.touches[0].clientX, e.touches[0].clientY);
            if (isDrawing) {
                if (lastMapX === c.mx && lastMapY === c.my) return;
                drawLine(lastMapX, lastMapY, c.mx, c.my, currentColor); lastMapX = c.mx; lastMapY = c.my; renderCanvas();
            } else if (isPanning) {
                camX -= (e.touches[0].clientX - lastMouseX) / zoom; camY -= (e.touches[0].clientY - lastMouseY) / zoom;
                camX = Math.max(0, Math.min(CONFIG.MAP_SIZE, camX)); camY = Math.max(0, Math.min(CONFIG.MAP_SIZE, camY)); lastMouseX = e.touches[0].clientX; lastMouseY = e.touches[0].clientY; renderCanvas();
            }
        } else if (e.touches.length === 2 && isPinching) {
            const dx = e.touches[0].clientX - e.touches[1].clientX, dy = e.touches[0].clientY - e.touches[1].clientY;
            const dist = Math.sqrt(dx*dx + dy*dy);
            const oldZoom = zoom; zoom *= (dist / initialPinchDistance); zoom = Math.max(0.5, Math.min(50.0, zoom));

            const pinchCenterX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
            const vw = ui.displayCanvas.width / zoom;
            camX += ((camX - vw/2 + pinchCenterX/zoom) - camX) * (oldZoom/zoom - 1);

            initialPinchDistance = dist; renderCanvas();
        }
    }, { passive: false });

    ui.displayCanvas.addEventListener('touchend', (e) => {
        if (isDrawing && currentAction && currentAction.pixels.length > 0) { undoHistory.push(currentAction); if (undoHistory.length > 10) undoHistory.shift(); }
        if (e.touches.length === 0) {
            isDrawing = false; isPanning = false; isPinching = false; currentAction = null;
        } else if (e.touches.length === 1) {
            isPinching = false; isDrawing = false; isPanning = true; // 줌 풀리면 이동모드로 스무스하게 전환
            lastMouseX = e.touches[0].clientX; lastMouseY = e.touches[0].clientY;
        }
    });

    window.addEventListener('keydown', (e) => {
        if (e.ctrlKey && e.key.toLowerCase() === 'z') {
            e.preventDefault(); if (undoHistory.length === 0) return; const action = undoHistory.pop();
            for (let i = action.pixels.length - 1; i >= 0; i--) { const p = action.pixels[i]; backCtx.putImageData(p.oldData, p.x, p.y); }
            currentQuota = Math.min(GameState.currentMaxQuota, currentQuota + action.quotaCost); updateTopStatusUI();
            if (currentQuota < GameState.currentMaxQuota) lastRegenTime = Date.now(); renderCanvas();
        }
    });

    window.addEventListener('resize', renderCanvas);
    ui.displayCanvas.addEventListener('contextmenu', e => e.preventDefault());

    // --- 7. 타이머 및 부팅 ---
    function updateTimer() {
        if (currentQuota < GameState.currentMaxQuota) {
            const elapsed = Date.now() - lastRegenTime;
            if (elapsed >= CONFIG.REGEN_TIME_MS) { currentQuota++; lastRegenTime = Date.now() - (elapsed - CONFIG.REGEN_TIME_MS); updateTopStatusUI(); }
            const currentElapsed = Date.now() - lastRegenTime;
            document.getElementById('regenProgressBar').style.width = `${(currentElapsed / CONFIG.REGEN_TIME_MS) * 100}%`;
            document.getElementById('regenTimeDisplay').textContent = (Math.max(0, CONFIG.REGEN_TIME_MS - currentElapsed) / 1000).toFixed(1);
        } else {
            document.getElementById('regenProgressBar').style.width = `100%`; document.getElementById('regenTimeDisplay').textContent = "0.0"; lastRegenTime = Date.now();
        }
        requestAnimationFrame(updateTimer);
    }

    function flushPixelBuffer() { if (isConnected && stompClient && pixelBuffer.length > 0) { stompClient.send("/app/draw", {}, JSON.stringify(pixelBuffer)); pixelBuffer = []; } }

    function connectWebSocket() {
        const socket = new SockJS('/ws-paint'); stompClient = Stomp.over(socket); stompClient.debug = null;
        stompClient.connect({}, () => {
            isConnected = true;
            stompClient.subscribe('/topic/canvas', (msg) => { JSON.parse(msg.body).forEach(data => setPixel(data.x, data.y, data.color, true)); renderCanvas(); });
            fetch('/api/canvas/snapshot').then(res => res.json()).then(data => {
                Object.entries(data).forEach(([key, color]) => { const [x, y] = key.split(':').map(Number); backCtx.fillStyle = color; backCtx.fillRect(x, y, 1, 1); }); renderCanvas();
            });
        });
    }

    initializeApp();
</script>
