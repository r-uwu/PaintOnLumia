<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PaintOnLumia - Profile Studio</title>
    <style>
        :root {
            --bg-main: #141418; --bg-panel: #1E1E24; --primary: #00E676; --accent: #FF3D00;
            --text-main: #FFFFFF; --text-sub: #B0BEC5; --border-color: #37474F;
        }
        body { margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: var(--bg-main); font-family: 'Pretendard', sans-serif; color: var(--text-main); }
        .studio-container { background: var(--bg-panel); padding: 30px; border-radius: 12px; border: 1px solid var(--border-color); box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: row; gap: 30px; max-width: 900px; width: 95%; max-height: 90vh; }

        .editor-section { display: flex; flex-direction: column; align-items: center; justify-content: center; background: #111; padding: 15px; border-radius: 8px; border: 1px solid #222; }

        #profileCanvas {
            width: 400px; height: 400px; background-color: #FFFFFF;
            background-image: linear-gradient(45deg, #f0f0f0 25%, transparent 25%), linear-gradient(-45deg, #f0f0f0 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #f0f0f0 75%), linear-gradient(-45deg, transparent 75%, #f0f0f0 75%);
            background-size: 20px 20px; background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            border: 2px solid var(--border-color); cursor: crosshair; image-rendering: pixelated;
        }

        .tools-section { flex: 1; display: flex; flex-direction: column; overflow-y: auto; padding-right: 10px; }
        .tools-section::-webkit-scrollbar { width: 6px; }
        .tools-section::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }

        .header h1 { margin: 0 0 5px 0; color: var(--primary); font-size: 24px; }
        .header p { margin: 0 0 20px 0; font-size: 13px; color: var(--text-sub); line-height: 1.5; }

        .settings-group { margin-bottom: 20px; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 8px; border: 1px solid var(--border-color); }
        .settings-label { font-size: 12px; font-weight: bold; color: var(--text-sub); display: block; margin-bottom: 8px; }

        .custom-input { width: 100%; padding: 10px; background: #111; color: #FFF; border: 1px solid var(--border-color); border-radius: 4px; box-sizing: border-box; }
        .custom-input:focus { outline: none; border-color: var(--primary); }

        .badge-grid { display: flex; flex-wrap: wrap; gap: 8px; }
        .badge-btn { background: rgba(255,255,255,0.05); padding: 6px 12px; border-radius: 20px; border: 1px solid var(--border-color); cursor: pointer; font-size: 12px; color: var(--text-sub); transition: 0.2s; user-select: none; }
        .badge-btn:hover { background: rgba(255,255,255,0.1); }
        .badge-btn.active { background: rgba(0, 230, 118, 0.1); border-color: var(--primary); color: var(--primary); font-weight: bold; }

        .palette-container { display: grid; grid-template-columns: repeat(8, 1fr); gap: 5px; }
        .palette-item { aspect-ratio: 1; border-radius: 4px; cursor: pointer; border: 2px solid transparent; transition: 0.2s; }
        .palette-item:hover { transform: scale(1.1); }
        .palette-item.selected { border-color: var(--primary); box-shadow: 0 0 10px var(--primary); }

        .btn { width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid var(--border-color); color: var(--text-main); font-weight: bold; cursor: pointer; border-radius: 6px; transition: 0.2s; margin-bottom: 8px; font-size: 14px; }
        .btn:hover { background: rgba(255,255,255,0.1); }
        .btn-primary { background: var(--primary); color: #000; border-color: var(--primary); }
        .btn-primary:hover { background: #00C853; transform: translateY(-2px); box-shadow: 0 4px 10px rgba(0, 230, 118, 0.3); }

        @media (max-width: 768px) {
            .studio-container { flex-direction: column; max-height: none; }
            #profileCanvas { width: 300px; height: 300px; }
        }
    </style>
</head>
<body>

<div class="studio-container">
    <div class="editor-section">
        <canvas id="profileCanvas" width="50" height="50"></canvas>
        <button class="btn" style="margin-top: 15px; border-color: #555;" onclick="clearCanvas()">도화지 전체 지우기</button>
    </div>

    <div class="tools-section">
        <div class="header">
            <h1>프로필 스튜디오</h1>
            <p>루미아 섬에 표시될 나의 아이덴티티를 설정하세요.</p>
        </div>

        <div class="settings-group">
            <label class="settings-label">닉네임</label>
            <input type="text" id="nicknameInput" class="custom-input" placeholder="새 닉네임 입력">
        </div>

        <div class="settings-group">
            <label class="settings-label">대표 칭호</label>
            <select id="titleSelect" class="custom-input">
            </select>
        </div>

        <div class="settings-group">
            <label class="settings-label">장착 배지 (최대 3개 선택)</label>
            <div class="badge-grid" id="badgeGrid">
            </div>
        </div>

        <div class="settings-group">
            <label class="settings-label">도트 팔레트</label>
            <div class="palette-container" id="userPalette">
            </div>
        </div>

        <div style="margin-top: 10px;">
            <button class="btn btn-primary" onclick="saveAllProfile()">모든 설정 저장하기</button>
            <button class="btn" onclick="window.location.href='/index.html'">돌아가기 (Ctrl+Z 되돌리기)</button>
        </div>
    </div>
</div>

<script>
    const currentUsername = sessionStorage.getItem('username');
    const jwtToken = sessionStorage.getItem('token');
    if (!currentUsername || !jwtToken) window.location.href = '/login.html';

    const authHeaders = { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + jwtToken };

    const SIZE = 100;
    const canvas = document.getElementById('profileCanvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });

    let pixelMap = new Array(SIZE * SIZE).fill('#FFFFFF');
    const MAX_UNDO_HISTORY = 30;
    let undoHistory = [];
    let currentAction = null;
    let currentStrokeCoords = new Set();

    let isDrawing = false;
    let currentColor = '#000000';
    let lastMapX = null;
    let lastMapY = null;

    let unlockedBadgesList = [];
    let selectedBadges = new Set();

    function renderBadges() {
        const container = document.getElementById('badgeGrid');
        container.innerHTML = '';

        // ✨ 해금된 배지 목록만 화면에 렌더링
        unlockedBadgesList.forEach(badge => {
            const btn = document.createElement('div');
            btn.className = `badge-btn ${selectedBadges.has(badge) ? 'active' : ''}`;
            btn.textContent = badge;

            btn.onclick = () => {
                if (selectedBadges.has(badge)) {
                    selectedBadges.delete(badge);
                    btn.classList.remove('active');
                } else {
                    if (selectedBadges.size >= 3) return alert("배지는 최대 3개까지만 장착 가능합니다.");
                    selectedBadges.add(badge);
                    btn.classList.add('active');
                }
            };
            container.appendChild(btn);
        });
    }

    function clearCanvas() {
        ctx.fillStyle = '#FFFFFF';
        ctx.fillRect(0, 0, SIZE, SIZE);
        pixelMap.fill('#FFFFFF');
        undoHistory = [];
    }

    function loadCanvasDataToMap() {
        const imgData = ctx.getImageData(0, 0, SIZE, SIZE).data;
        for (let i = 0; i < SIZE * SIZE; i++) {
            const r = imgData[i * 4]; const g = imgData[i * 4 + 1]; const b = imgData[i * 4 + 2]; const a = imgData[i * 4 + 3];
            pixelMap[i] = (a === 0) ? '#FFFFFF' : "#" + (1 << 24 | r << 16 | g << 8 | b).toString(16).slice(1).toUpperCase();
        }
    }

    function setPixel(x, y, color) {
        if (x < 0 || x >= SIZE || y < 0 || y >= SIZE) return;
        const index = y * SIZE + x;
        const oldColor = pixelMap[index];
        if (oldColor === color) return;
        const pixelKey = `${x},${y}`;
        if (currentStrokeCoords.has(pixelKey)) return;
        currentStrokeCoords.add(pixelKey);
        if (currentAction) currentAction.pixels.push({ x, y, oldColor });
        pixelMap[index] = color;
        ctx.fillStyle = color;
        ctx.fillRect(x, y, 1, 1);
    }

    function drawLine(x1, y1, x2, y2, color) {
        const dx = Math.abs(x2 - x1); const dy = Math.abs(y2 - y1);
        const sx = (x1 < x2) ? 1 : -1; const sy = (y1 < y2) ? 1 : -1;
        let err = dx - dy;
        while (true) {
            setPixel(x1, y1, color);
            if (x1 === x2 && y1 === y2) break;
            const e2 = 2 * err;
            if (e2 > -dy) { err -= dy; x1 += sx; }
            if (e2 < dx) { err += dx; y1 += sy; }
        }
    }

    function triggerUndo() {
        if (undoHistory.length === 0) return alert("되돌릴 작업이 없습니다.");
        const action = undoHistory.pop();
        action.pixels.forEach(p => {
            pixelMap[p.y * SIZE + p.x] = p.oldColor;
            ctx.fillStyle = p.oldColor;
            ctx.fillRect(p.x, p.y, 1, 1);
        });
    }

    function getCoords(e) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width; const scaleY = canvas.height / rect.height;
        let clientX = e.clientX; let clientY = e.clientY;
        if (e.touches && e.touches.length > 0) { clientX = e.touches[0].clientX; clientY = e.touches[0].clientY; }
        return { x: Math.floor((clientX - rect.left) * scaleX), y: Math.floor((clientY - rect.top) * scaleY) };
    }

    function startDraw(e) {
        if (e.button !== undefined && e.button !== 0) return;
        isDrawing = true; const coords = getCoords(e);
        lastMapX = coords.x; lastMapY = coords.y;
        currentStrokeCoords.clear(); currentAction = { pixels: [] };
        setPixel(coords.x, coords.y, currentColor);
    }

    function doDraw(e) {
        if (!isDrawing) return;
        if (e.cancelable) e.preventDefault();
        const coords = getCoords(e);
        if (lastMapX !== coords.x || lastMapY !== coords.y) {
            drawLine(lastMapX, lastMapY, coords.x, coords.y, currentColor);
            lastMapX = coords.x; lastMapY = coords.y;
        }
    }

    function endDraw() {
        if (isDrawing && currentAction && currentAction.pixels.length > 0) {
            undoHistory.push(currentAction);
            if (undoHistory.length > MAX_UNDO_HISTORY) undoHistory.shift();
        }
        isDrawing = false; currentAction = null;
    }

    canvas.addEventListener('mousedown', startDraw); canvas.addEventListener('mousemove', doDraw); window.addEventListener('mouseup', endDraw);
    canvas.addEventListener('touchstart', startDraw, { passive: false }); canvas.addEventListener('touchmove', doDraw, { passive: false }); window.addEventListener('touchend', endDraw);
    window.addEventListener('keydown', (e) => { if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'z') { e.preventDefault(); triggerUndo(); } });

    async function initializeStudio() {
        clearCanvas();
        try {
            const res = await fetch(`/api/user/info?username=${currentUsername}`, { headers: authHeaders });
            if (!res.ok) throw new Error("Auth Failed");
            const userData = await res.json();

            if (userData.profileIconBase64) {
                const img = new Image();
                img.onload = () => { ctx.drawImage(img, 0, 0); loadCanvasDataToMap(); };
                img.src = userData.profileIconBase64;
            }

            // 닉네임 로드
            document.getElementById('nicknameInput').value = userData.nickname || currentUsername;

            // 칭호 로드
            if (userData.title) document.getElementById('titleSelect').value = userData.title;

            // 배지 로드
            if (userData.badges) {
                selectedBadges = new Set(userData.badges.split(',').map(b => b.trim()).filter(b => b));
            }

            // 해금된 배지
            if (userData.unlockedBadges) {
                unlockedBadgesList = userData.unlockedBadges.split(',').map(b => b.trim()).filter(b => b);
            } else {
                unlockedBadgesList = ['배지 로딩 버그'];
            }

            // 해금된 칭호
            const titleSelect = document.getElementById('titleSelect');
            titleSelect.innerHTML = '';

            unlockedTitlesList = userData.unlockedTitles ? userData.unlockedTitles.split(',') : ['루미아 아티스트'];

            unlockedTitlesList.forEach(t => {
                const opt = document.createElement('option');
                opt.value = t.trim();
                opt.textContent = t.trim();
                titleSelect.appendChild(opt);
            });

            // 현재 장착 중인 칭호 선택
            if (userData.title) titleSelect.value = userData.title;

            renderBadges();

            // 팔레트 로드
            const paletteContainer = document.getElementById('userPalette');
            const unlockedColors = userData.unlockedColors ? userData.unlockedColors.split(',') : ['#000000'];
            unlockedColors.forEach((color, index) => {
                const item = document.createElement('div');
                item.className = 'palette-item'; item.style.backgroundColor = color;
                if (index === 0) { item.classList.add('selected'); currentColor = color; }
                item.onclick = () => {
                    document.querySelectorAll('.palette-item').forEach(el => el.classList.remove('selected'));
                    item.classList.add('selected'); currentColor = color;
                };
                paletteContainer.appendChild(item);
            });

        } catch (e) {
            alert("세션이 만료되었습니다.");
            window.location.href = '/login.html';
        }
    }

    // ✨ 전체 저장 함수 (이미지 + 닉네임 + 칭호 + 배지)
    async function saveAllProfile() {
        const nickname = document.getElementById('nicknameInput').value.trim();
        if (!nickname) return alert("닉네임을 입력해주세요.");

        const title = document.getElementById('titleSelect').value;
        const badges = Array.from(selectedBadges).join(',');
        const base64Image = canvas.toDataURL('image/png');

        try {
            const res = await fetch('/api/user/profile', {
                method: 'POST',
                headers: authHeaders,
                body: JSON.stringify({
                    username: currentUsername,
                    image: base64Image,
                    nickname: nickname,
                    title: title,
                    badges: badges
                })
            });
            if (res.ok) {
                sessionStorage.setItem('nickname', nickname); // 세션 동기화
                alert("성공적으로 저장되었습니다!");
                window.location.href = '/index.html';
            } else {
                alert("저장에 실패했습니다.");
            }
        } catch (e) { alert("서버 통신 오류"); }
    }

    initializeStudio();
</script>
</body>
</html>
