<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PaintOnLumia - Profile Studio</title>
    <style>
        :root {
            --bg-main: #141418; --bg-panel: #1E1E24; --primary: #00E676; --accent: #FF3D00;
            --text-main: #FFFFFF; --text-sub: #B0BEC5; --border-color: #37474F;
        }
        body { margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: var(--bg-main); font-family: 'Pretendard', sans-serif; color: var(--text-main); }
        .studio-container { background: var(--bg-panel); padding: 30px; border-radius: 12px; border: 1px solid var(--border-color); box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: row; gap: 30px; max-width: 800px; width: 90%; }

        .editor-section { display: flex; flex-direction: column; align-items: center; justify-content: center; background: #111; padding: 15px; border-radius: 8px; border: 1px solid #222; }

        #profileCanvas {
            width: 300px; height: 300px; background-color: #FFFFFF;
            background-image: linear-gradient(45deg, #eee 25%, transparent 25%, transparent 75%, #eee 75%, #eee), linear-gradient(45deg, #eee 25%, transparent 25%, transparent 75%, #eee 75%, #eee);
            background-size: 20px 20px; background-position: 0 0, 10px 10px;
            border: 2px solid var(--border-color); cursor: crosshair; image-rendering: pixelated;
        }

        .tools-section { flex: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .header h1 { margin: 0 0 5px 0; color: var(--primary); font-size: 24px; }
        .header p { margin: 0; font-size: 13px; color: var(--text-sub); line-height: 1.5; }

        .control-group { margin-bottom: 20px; }
        .control-group label { display: block; font-size: 13px; font-weight: bold; color: var(--text-sub); margin-bottom: 8px; }

        input[type="color"] { width: 100%; height: 45px; border: none; cursor: pointer; background: var(--bg-main); border-radius: 6px; padding: 2px; }

        .btn { width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid var(--border-color); color: var(--text-main); font-weight: bold; cursor: pointer; border-radius: 6px; transition: 0.2s; margin-bottom: 10px; font-size: 14px; }
        .btn:hover { background: rgba(255,255,255,0.1); }
        .btn-primary { background: var(--primary); color: #000; border-color: var(--primary); }
        .btn-primary:hover { background: #00C853; transform: translateY(-2px); box-shadow: 0 4px 10px rgba(0, 230, 118, 0.3); }
        .btn-danger { color: var(--accent); border-color: rgba(255, 61, 0, 0.3); }
        .btn-danger:hover { background: rgba(255, 61, 0, 0.1); }

        @media (max-width: 768px) {
            .studio-container { flex-direction: column; padding: 20px; }
            #profileCanvas { width: 250px; height: 250px; }
        }
    </style>
</head>
<body>

<div class="studio-container">
    <div class="editor-section">
        <canvas id="profileCanvas" width="100" height="100"></canvas>
    </div>

    <div class="tools-section">
        <div class="header">
            <h1>프로필 스튜디오</h1>
            <p>100x100 해상도의 캔버스입니다.<br>나만의 도트를 찍어 프로필 아이콘을 설정하세요.</p>
        </div>

        <div class="control-group" style="margin-top: 20px;">
            <label>브러시 색상</label>
            <input type="color" id="colorPicker" value="#000000">
        </div>

        <div>
            <button class="btn btn-danger" onclick="clearCanvas()">전체 지우기</button>
            <button class="btn btn-primary" onclick="saveProfile()">프로필 이미지 저장</button>
            <button class="btn" onclick="window.location.href='/index.html'">메인 캔버스로 돌아가기</button>
        </div>
    </div>
</div>

<script>
    const currentUsername = sessionStorage.getItem('username');
    const jwtToken = sessionStorage.getItem('token');

    if (!currentUsername || !jwtToken) window.location.href = '/login.html';

    const authHeaders = {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + jwtToken
    };

    const canvas = document.getElementById('profileCanvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const colorPicker = document.getElementById('colorPicker');

    let isDrawing = false;
    let currentColor = '#000000';

    function clearCanvas() { ctx.clearRect(0, 0, 100, 100); }
    colorPicker.addEventListener('input', (e) => currentColor = e.target.value);

    function getCanvasCoords(e) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        let clientX = e.clientX; let clientY = e.clientY;
        if(e.touches && e.touches.length > 0) { clientX = e.touches[0].clientX; clientY = e.touches[0].clientY; }
        return { x: Math.floor((clientX - rect.left) * scaleX), y: Math.floor((clientY - rect.top) * scaleY) };
    }

    function draw(e) {
        if (!isDrawing) return;
        const coords = getCanvasCoords(e);
        ctx.fillStyle = currentColor; ctx.fillRect(coords.x, coords.y, 1, 1);
    }

    canvas.addEventListener('mousedown', (e) => { isDrawing = true; draw(e); });
    window.addEventListener('mouseup', () => isDrawing = false);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); isDrawing = true; draw(e); }, { passive: false });
    window.addEventListener('touchend', () => isDrawing = false);
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e); }, { passive: false });

    async function loadExistingProfile() {
        try {
            // ✨ 프로필 로드 시 헤더 추가
            const res = await fetch(`/api/user/info?username=${currentUsername}`, { headers: authHeaders });
            if(res.status === 401 || res.status === 403) { alert("인증이 만료되었습니다."); window.location.href = '/login.html'; return; }
            const data = await res.json();
            if (data.profileIconBase64) {
                const img = new Image();
                img.onload = () => ctx.drawImage(img, 0, 0);
                img.src = data.profileIconBase64;
            }
        } catch (e) { console.error("기존 프로필 로드 실패"); }
    }
    loadExistingProfile();

    async function saveProfile() {
        const base64Image = canvas.toDataURL('image/png');
        try {
            // ✨ 프로필 저장 시 헤더 추가
            const res = await fetch('/api/user/profile', {
                method: 'POST',
                headers: authHeaders,
                body: JSON.stringify({ username: currentUsername, image: base64Image })
            });

            if (res.ok) {
                alert("프로필이 저장되었습니다.");
                window.location.href = '/index.html';
            } else { alert("저장 실패"); }
        } catch (e) { alert("서버 연결 오류"); }
    }
</script>
</body>
</html>
