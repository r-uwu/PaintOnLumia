<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PaintOnLumia - Login</title>
    <style>
        :root {
            --bg-main: #141418; --bg-panel: #1E1E24; --primary: #00E676;
            --text-main: #FFFFFF; --text-sub: #B0BEC5; --border-color: #37474F;
        }
        body { margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: var(--bg-main); font-family: 'Pretendard', sans-serif; color: var(--text-main); }
        .auth-container { background: var(--bg-panel); padding: 40px; border-radius: 12px; border: 1px solid var(--border-color); width: 100%; max-width: 360px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; }
        .logo { font-size: 28px; font-weight: bold; color: var(--primary); margin-bottom: 5px; letter-spacing: 1px; }
        .subtitle { font-size: 13px; color: var(--text-sub); margin-bottom: 30px; }
        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; font-size: 12px; color: var(--text-sub); margin-bottom: 5px; font-weight: bold; }
        .input-group input { width: 100%; padding: 12px; background: #111; border: 1px solid var(--border-color); color: #FFF; border-radius: 6px; box-sizing: border-box; transition: 0.2s; }
        .input-group input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 8px rgba(0, 230, 118, 0.2); }
        .btn { width: 100%; padding: 14px; background: var(--primary); color: #000; border: none; border-radius: 6px; font-weight: bold; font-size: 15px; cursor: pointer; transition: 0.2s; margin-top: 10px; }
        .btn:hover { background: #00C853; transform: translateY(-2px); box-shadow: 0 4px 10px rgba(0, 230, 118, 0.3); }
        .link-text { margin-top: 20px; font-size: 13px; color: var(--text-sub); }
        .link-text a { color: var(--primary); text-decoration: none; font-weight: bold; }
        .link-text a:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="auth-container">
    <div class="logo">PaintOnLumia</div>
    <div class="subtitle">루미아 섬의 아티스트로 로그인하세요</div>

    <div class="input-group">
        <label for="username">아이디</label>
        <input type="text" id="username" placeholder="아이디를 입력하세요" autocomplete="off">
    </div>
    <div class="input-group">
        <label for="password">비밀번호</label>
        <input type="password" id="password" placeholder="비밀번호를 입력하세요">
    </div>

    <button class="btn" onclick="attemptLogin()">접속하기</button>

    <div class="link-text">
        아직 계정이 없으신가요? <a href="/register.html">회원가입</a>
    </div>
</div>

<script>
        async function attemptLogin() {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();
        if (!username || !password) return alert("아이디와 비밀번호를 모두 입력해주세요.");

        try {
        const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
    });

        if (res.ok) {
        // 서버에서 받은 JSON + 토큰 파싱
        const data = await res.json();

        // 아이디 + JWT 토큰
        sessionStorage.setItem('token', data.token);
        sessionStorage.setItem('username', data.username);

        window.location.href = '/index.html';
    } else {
        alert("아이디 또는 비밀번호가 일치하지 않습니다.");
    }
    } catch (e) {
        alert("서버와 통신할 수 없습니다.");
    }
    }

        document.addEventListener('keypress', function (e) {
        if (e.key === 'Enter') attemptLogin();
    });
</script>
</body>
</html>
